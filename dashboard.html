<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&amp;D Party Dashboard</title>
<style>
:root {
  --bg: #1a1410;
  --bg-card: #211a14;
  --bg-deep: #120d0a;
  --border: #3a2f24;
  --border-strong: #5a4a36;
  --gold: #c9a961;
  --gold-bright: #e6c585;
  --bronze: #8b6f3a;
  --copper: #b87333;
  --crimson: #a02c2c;
  --crimson-bright: #d63838;
  --green: #5a8c3a;
  --text: #f0e6d2;
  --text-dim: #a89880;
  --text-faint: #6f6450;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { background: var(--bg); color: var(--text); min-height: 100vh; }

body {
  font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  background:
    radial-gradient(circle at 20% 0%, rgba(201,169,97,0.08), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(160,44,44,0.06), transparent 50%),
    var(--bg);
  background-attachment: fixed;
  padding-bottom: 8rem;   /* room for the sticky dice panel */
}

h1, h2, h3, .serif {
  font-family: "Cinzel", "Trajan Pro", "Palatino Linotype", "Palatino", serif;
  letter-spacing: 0.05em;
}

/* ─── TOPBAR ─── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(180deg, rgba(18,13,10,0.98), rgba(18,13,10,0.92));
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  padding: 0.8rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  gap: 1rem; flex-wrap: wrap;
}
/* Centered slot in the topbar — used for the Ko-fi button.
   Absolutely positioned so the title (left) and actions (right) keep
   their natural sizes; on mobile (see media query) it drops to its own line. */
.topbar-center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;        /* let clicks fall through empty space… */
}
.topbar-center > * { pointer-events: auto; }   /* …but not on the button itself */
.topbar-title { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
.topbar-title h1 {
  font-size: 1.5rem; color: var(--gold-bright);
  font-weight: 700; text-transform: uppercase;
  text-shadow: 0 0 18px rgba(201,169,97,0.25);
}
.topbar-title .sub { color: var(--text-faint); font-size: 0.8rem; }

.topbar-actions { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
.topbar-actions .meta { color: var(--text-faint); font-size: 0.78rem; }
.topbar-actions .live-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); margin-right: 6px; vertical-align: middle;
  box-shadow: 0 0 8px var(--green); animation: pulse 2s ease-in-out infinite;
}
.topbar-actions .live-dot.stale { background: var(--crimson); box-shadow: 0 0 8px var(--crimson); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

button, .btn {
  background: var(--bg-card); color: var(--text);
  border: 1px solid var(--border-strong); border-radius: 6px;
  padding: 7px 14px; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
button:hover { background: var(--bronze); color: var(--bg); border-color: var(--gold); }
button:active { transform: translateY(1px); }
button.primary { background: var(--bronze); color: var(--bg); border-color: var(--gold); }
button.primary:hover { background: var(--gold); border-color: var(--gold-bright); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

select.identity-select {
  background: var(--bg-deep); color: var(--gold-bright);
  border: 1px solid var(--gold); border-radius: 6px;
  padding: 7px 12px; font-size: 0.9rem; font-weight: 700;
  font-family: inherit; cursor: pointer;
  background-image: linear-gradient(45deg, transparent 50%, var(--gold) 50%),
                    linear-gradient(135deg, var(--gold) 50%, transparent 50%);
  background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  -webkit-appearance: none; appearance: none;
  padding-right: 28px;
}
select.identity-select option { background: var(--bg-card); color: var(--text); }

/* ─── GRID ─── */
.grid {
  max-width: 1600px; margin: 1.5rem auto; padding: 0 1.5rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 1.5rem;
}

/* ─── CARD ─── */
.card {
  background: linear-gradient(180deg, var(--bg-card), var(--bg-deep));
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 6px 30px rgba(0,0,0,0.4);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.5;
}
.card.is-me {
  border-color: var(--gold);
  box-shadow: 0 6px 30px rgba(0,0,0,0.4), 0 0 0 2px rgba(201,169,97,0.4), 0 0 30px rgba(201,169,97,0.25);
}
.card .me-badge {
  position: absolute; top: 0.5rem; right: 0.5rem;
  background: var(--gold); color: var(--bg);
  padding: 2px 10px; border-radius: 100px;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; z-index: 2;
}

.card-header {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem 1.2rem;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}
.avatar {
  width: 64px; height: 64px; border-radius: 50%;
  border: 2px solid var(--gold); object-fit: cover;
  background: var(--bg-deep); flex-shrink: 0;
}
.avatar-fallback {
  width: 64px; height: 64px; border-radius: 50%;
  border: 2px solid var(--bronze); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-deep); color: var(--gold);
  font-family: "Cinzel", serif; font-size: 1.6rem; font-weight: 700;
}
.identity { min-width: 0; flex: 1; }
.identity h2 {
  font-size: 1.25rem; color: var(--gold-bright);
  text-transform: uppercase; line-height: 1.1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.identity h2 a {
  color: inherit; text-decoration: none;
  transition: color 0.15s, text-shadow 0.15s;
}
.identity h2 a:hover {
  color: var(--gold);
  text-shadow: 0 0 8px rgba(201,169,97,0.5);
}
.identity .meta-line {
  color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem;
  display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
}
.identity .meta-line .cls { color: var(--text); }
.identity .level-pill {
  background: var(--bronze); color: var(--bg);
  font-size: 0.7rem; font-weight: 700; padding: 1px 8px;
  border-radius: 100px;
}

.inspired-badge {
  font-size: 1.8rem; user-select: none; flex-shrink: 0;
  color: var(--text-faint); filter: grayscale(100%);
}
.inspired-badge.on {
  color: var(--gold-bright); filter: none;
  text-shadow: 0 0 12px rgba(230,197,133,0.6);
}

/* ─── VITALS ─── */
.vitals {
  padding: 1rem 1.2rem;
  display: grid;
  grid-template-columns: 2.2fr 1fr 1fr 1fr 1fr;
  gap: 0.5rem;
  align-items: stretch;
}
.vital {
  background: rgba(0,0,0,0.25); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.6rem 0.4rem; text-align: center;
  display: flex; flex-direction: column; justify-content: center;
}
.vital-label {
  font-size: 0.65rem; color: var(--text-faint);
  text-transform: uppercase; letter-spacing: 1px;
}
.vital-value {
  font-size: 1.6rem; font-weight: 700; color: var(--gold-bright);
  margin-top: 2px; line-height: 1; font-variant-numeric: tabular-nums;
}
.vital-sub { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; }

.hp-block {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.7rem 0.8rem;
  display: flex; flex-direction: column; gap: 0.5rem;
  justify-content: center;
}
.hp-row1 { display: flex; align-items: baseline; justify-content: space-between; }
.hp-label { font-size: 0.65rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; }
.hp-value { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--gold-bright); }
.hp-value .max { color: var(--text-dim); font-size: 1.1rem; font-weight: 400; }
.hp-bar {
  height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px;
  overflow: hidden; border: 1px solid var(--border);
}
.hp-bar-fill { height: 100%; transition: width 0.4s, background 0.4s; }

/* ─── STATS ─── */
.stats {
  padding: 0 1.2rem 1rem;
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.4rem;
}
.stat {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.5rem 0.2rem; text-align: center;
  transition: all 0.15s;
}
.stat.rollable { cursor: pointer; }
.stat.rollable:hover {
  border-color: var(--gold); background: rgba(201,169,97,0.12);
  transform: translateY(-1px);
}
.stat.rollable:hover .stat-mod { color: var(--gold-bright); }
.stat-name {
  font-size: 0.65rem; color: var(--gold);
  font-weight: 700; letter-spacing: 1px;
}
.stat-mod {
  font-size: 1.3rem; font-weight: 700; color: var(--text);
  margin: 1px 0; line-height: 1; font-variant-numeric: tabular-nums;
}
.stat-val { font-size: 0.7rem; color: var(--text-faint); font-variant-numeric: tabular-nums; }

/* ─── CONDITIONS-BAR (nur sichtbar wenn aktiv) ─── */
.conditions-bar {
  padding: 0 1.2rem 0.8rem;
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  align-items: center;
}
.conditions-bar .cond-label {
  font-size: 0.65rem; color: var(--crimson-bright);
  text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700;
  margin-right: 0.3rem;
}
.conditions-bar .cond {
  font-size: 0.75rem; padding: 4px 12px; border-radius: 100px;
  background: var(--crimson); color: var(--text);
  border: 1px solid var(--crimson-bright);
  box-shadow: 0 0 10px rgba(214,56,56,0.35);
  font-weight: 600;
  letter-spacing: 0.5px;
}
.conditions-bar .cond.exhaustion { background: #5a3a3a; }

/* ─── EXPANDABLE ─── */
.expand-toggle {
  display: block; width: 100%; padding: 0.6rem;
  background: transparent; border: none; border-top: 1px solid var(--border);
  color: var(--text-faint); font-size: 0.75rem;
  text-transform: uppercase; letter-spacing: 1.5px;
  border-radius: 0;
}
.expand-toggle:hover { background: rgba(201,169,97,0.05); color: var(--gold); border-color: var(--border); }
.expand-content {
  padding: 0.8rem 1.2rem 1rem;
  display: none; border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
}
.expand-content.open { display: block; }

.section-title {
  font-size: 0.7rem; color: var(--text-faint);
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 0.5rem;
}

.skill-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 0.15rem 1rem; font-size: 0.78rem;
}
.skill {
  display: flex; justify-content: space-between; padding: 3px 4px;
  border-radius: 4px; transition: background 0.1s;
}
.skill .name { color: var(--text-dim); }
.skill .name::before { content: "○ "; color: var(--text-faint); }
.skill.prof .name { color: var(--text); }
.skill.prof .name::before { content: "● "; color: var(--gold); }
.skill.expert .name::before { content: "◉ "; color: var(--gold-bright); }
.skill .mod {
  color: var(--gold); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.skill.rollable { cursor: pointer; }
.skill.rollable:hover { background: rgba(201,169,97,0.12); }
.skill.rollable:hover .mod { color: var(--gold-bright); }

.actions-list { display: flex; flex-direction: column; gap: 0.3rem; }
.lim-action {
  display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
  background: rgba(0,0,0,0.25); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.4rem 0.7rem;
}
.lim-action .name { font-size: 0.85rem; }
.lim-action .reset { font-size: 0.7rem; color: var(--text-faint); }
.lim-charges { display: flex; gap: 4px; flex-shrink: 0; }
.lim-charge {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--bg-deep); border: 2px solid var(--bronze);
}
.lim-charge.used { background: var(--crimson); border-color: var(--crimson-bright); }

.coins { display: flex; gap: 0.8rem; flex-wrap: wrap; font-size: 0.85rem; }
.coin { display: flex; align-items: center; gap: 4px; color: var(--text-dim); }
.coin .v { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
.coin.pp::before { content: "◆"; color: #d8d8e8; }
.coin.gp::before { content: "◆"; color: var(--gold-bright); }
.coin.ep::before { content: "◆"; color: #c4d6c4; }
.coin.sp::before { content: "◆"; color: #d0d0d0; }
.coin.cp::before { content: "◆"; color: var(--copper); }

/* ─── PRIVATE CARD ─── */
.card.private {
  border-style: dashed; border-color: var(--border-strong);
  text-align: center; padding: 1.5rem 1.2rem;
}
.card.private .private-icon { font-size: 2.5rem; opacity: 0.4; margin-bottom: 0.5rem; }
.card.private h3 { color: var(--text-dim); font-size: 1rem; margin-bottom: 0.5rem; }
.card.private p { color: var(--text-faint); font-size: 0.85rem; line-height: 1.5; }
.card.private code {
  display: inline-block; background: var(--bg-deep); color: var(--gold);
  padding: 1px 6px; border-radius: 4px; font-size: 0.8rem; margin-top: 0.4rem;
}

/* ─── STATUS / ERROR ─── */
.status {
  text-align: center; padding: 4rem 2rem;
  color: var(--text-faint); font-size: 1.1rem;
  grid-column: 1 / -1;
}
.status.error { color: var(--crimson-bright); }
.status code { background: var(--bg-deep); padding: 2px 6px; border-radius: 4px; }
.spinner {
  display: inline-block; width: 24px; height: 24px;
  border: 3px solid var(--border); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-right: 0.6rem; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.card.error { padding: 1rem; color: var(--crimson-bright); border-color: var(--crimson); }

/* ─── DICE PANEL (player) ─── */
.dice-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, rgba(18,13,10,0.96), rgba(18,13,10,1));
  border-top: 2px solid var(--gold);
  box-shadow: 0 -8px 30px rgba(0,0,0,0.6);
  z-index: 100; padding: 0.8rem 1.5rem;
  backdrop-filter: blur(10px);
  display: none;
}
.dice-panel.show { display: block; }
.dice-panel-inner {
  max-width: 1600px; margin: 0 auto;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.dice-panel-label {
  font-family: "Cinzel", serif; color: var(--gold-bright);
  font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px;
}
.dice-panel-label small { display: block; color: var(--text-faint); font-size: 0.7rem; font-weight: 400; letter-spacing: 0; text-transform: none; margin-top: 2px; }

.dice-set { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.die-btn {
  padding: 8px 14px; min-width: 56px; text-align: center;
  background: var(--bg-card); border: 1.5px solid var(--bronze);
  border-radius: 8px; color: var(--text); font-weight: 700;
  font-family: inherit; cursor: pointer; transition: all 0.15s;
}
.die-btn:hover {
  background: var(--bronze); color: var(--bg); border-color: var(--gold);
  transform: translateY(-2px);
}
.die-btn:active { transform: translateY(0); }
.die-btn.death-save {
  background: var(--bg-deep); border-color: var(--crimson);
  color: var(--crimson-bright);
}
.die-btn.death-save:hover {
  background: var(--crimson); color: var(--text); border-color: var(--crimson-bright);
  box-shadow: 0 0 12px rgba(214,56,56,0.5);
}

/* ─── Right-click context menu (adv/dis) ─── */
.roll-context-menu {
  position: fixed; z-index: 500;
  background: var(--bg-card); border: 1px solid var(--gold);
  border-radius: 8px; padding: 0.3rem;
  box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  display: flex; flex-direction: column; gap: 2px;
  min-width: 180px;
}
.roll-context-menu .menu-item {
  background: transparent; border: none; padding: 8px 12px;
  text-align: left; color: var(--text); font-family: inherit;
  font-size: 0.9rem; border-radius: 4px; cursor: pointer;
}
.roll-context-menu .menu-item:hover { background: var(--bg-deep); }
.roll-context-menu .menu-item.adv:hover { background: var(--green); color: var(--text); }
.roll-context-menu .menu-item.dis:hover { background: var(--crimson); color: var(--text); }
.roll-context-menu .menu-hint {
  padding: 4px 12px; color: var(--text-faint);
  font-size: 0.7rem; border-bottom: 1px solid var(--border); margin-bottom: 4px;
}

.dice-custom { display: flex; gap: 0.4rem; align-items: center; flex: 1; min-width: 240px; }
.dice-custom input {
  flex: 1; padding: 8px 12px; background: var(--bg-deep);
  color: var(--text); border: 1px solid var(--border-strong);
  border-radius: 6px; font-family: inherit; font-size: 0.9rem;
  font-variant-numeric: tabular-nums;
}
.dice-custom input::placeholder { color: var(--text-faint); }
.dice-custom input:focus { outline: none; border-color: var(--gold); }

.dice-status {
  margin-left: auto;
  color: var(--text-faint); font-size: 0.8rem;
  font-style: italic;
}
.dice-status.flash { color: var(--green); font-style: normal; font-weight: 600; }

/* ─── PARTY OVERVIEW (unten, Gruppen-Statistik) ─── */
.party-overview {
  max-width: 1600px; margin: 2.5rem auto 1rem; padding: 0 1.5rem;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1rem;
}
.party-overview .ov-card.ov-stat      { grid-column: span 2; }
.party-overview .ov-card.ov-hp        { grid-column: span 4; }
.party-overview .ov-card.ov-ac        { grid-column: span 3; }
.party-overview .ov-card.ov-currency  { grid-column: span 5; }
.party-overview .ov-card.ov-magic     { grid-column: span 5; }
.party-overview .ov-card.ov-tools     { grid-column: span 4; }
.party-overview .ov-card.ov-langs     { grid-column: span 3; }
.party-overview .ov-card.ov-party     { grid-column: span 12; }
@media (max-width: 1100px) {
  .party-overview .ov-card.ov-stat     { grid-column: span 4; }
  .party-overview .ov-card.ov-hp,
  .party-overview .ov-card.ov-ac,
  .party-overview .ov-card.ov-currency { grid-column: span 6; }
  .party-overview .ov-card.ov-magic,
  .party-overview .ov-card.ov-tools,
  .party-overview .ov-card.ov-langs    { grid-column: span 12; }
  .party-overview .ov-card.ov-party    { grid-column: span 12; }
}
@media (max-width: 720px) {
  .party-overview .ov-card.ov-stat,
  .party-overview .ov-card { grid-column: span 12; }
}
.party-overview h2 {
  grid-column: 1 / -1;
  font-size: 1.1rem; color: var(--gold-bright);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 0.3rem; padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.party-overview .ov-card {
  background: linear-gradient(180deg, var(--bg-card), var(--bg-deep));
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.1rem;
  position: relative;
}
.party-overview .ov-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.4;
}
.party-overview .ov-title {
  font-family: "Cinzel", serif; color: var(--gold-bright);
  font-size: 0.95rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase;
}
.party-overview .ov-sub {
  font-size: 0.7rem; color: var(--text-faint);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 0.6rem;
}
.party-overview .ov-line {
  font-size: 0.85rem; color: var(--text); padding: 1px 0;
  font-variant-numeric: tabular-nums;
}
.party-overview .ov-line .lbl { color: var(--text-dim); }
.party-overview .ov-list {
  font-size: 0.82rem; color: var(--text); line-height: 1.5;
}
.party-overview .ov-list .item { display: block; }
.party-overview .ov-currency .coin {
  display: flex; justify-content: space-between;
  font-size: 0.85rem; padding: 1px 0;
  font-variant-numeric: tabular-nums;
}
.party-overview .ov-currency .coin.total {
  margin-top: 0.4rem; padding-top: 0.4rem;
  border-top: 1px solid var(--border);
  color: var(--gold-bright); font-weight: 700;
}

.party-overview .party-inventory .items-scroll {
  max-height: 320px; overflow-y: auto;
  margin-top: 0.4rem;
  padding-right: 6px;
}
.party-overview .party-item {
  display: flex; justify-content: space-between; gap: 0.6rem;
  padding: 4px 6px; border-radius: 4px;
  font-size: 0.82rem;
  border-bottom: 1px solid rgba(58,47,36,0.4);
}
.party-overview .party-item:hover { background: rgba(201,169,97,0.06); }
.party-overview .party-item .item-name { color: var(--text); flex: 1; }
.party-overview .party-item .item-name .attune { color: var(--gold-bright); margin-left: 4px; }
.party-overview .party-item .item-rarity {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 1px 6px; border-radius: 3px; align-self: center;
  background: var(--bg-deep); color: var(--text-faint);
}
.party-overview .party-item .item-rarity.uncommon  { color: #5cb85c; }
.party-overview .party-item .item-rarity.rare      { color: #5bc0de; }
.party-overview .party-item .item-rarity.very-rare { color: #b266ff; }
.party-overview .party-item .item-rarity.legendary { color: #f0a500; }
.party-overview .party-item .item-rarity.artifact  { color: #ff5252; }
.party-overview .party-item .item-holders {
  color: var(--text-dim); font-size: 0.78rem; text-align: right;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 35%;
}

/* ─── DM-SETUP-PAGE ─── */
.setup-page {
  max-width: 600px; margin: 4rem auto; padding: 2rem;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.setup-page h1 {
  color: var(--gold-bright); margin-bottom: 1rem;
  text-shadow: 0 0 18px rgba(201,169,97,0.25);
}
.setup-page p { color: var(--text-dim); line-height: 1.6; margin-bottom: 1rem; }
.setup-page input[type=text] {
  width: 100%; padding: 10px 12px; margin: 0.5rem 0;
  background: var(--bg-deep); color: var(--gold-bright);
  border: 1px solid var(--gold); border-radius: 6px;
  font-family: monospace; font-size: 0.85rem;
}

/* ─── ROLL TOAST (dice animation) ─── */
#rollToastContainer {
  position: fixed; top: 18%; left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex; flex-direction: column; gap: 0.5rem;
  pointer-events: none;
}
.roll-toast {
  background: linear-gradient(135deg, var(--bg-card), var(--bg-deep));
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 0.8rem 1.4rem;
  display: flex; align-items: center; gap: 1rem;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6),
              0 0 30px rgba(201,169,97,0.35);
  animation: rollToastIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  min-width: 240px; max-width: 360px;
}
.roll-toast .dice-icon {
  font-size: 2.4rem; display: inline-block;
  animation: diceRoll 0.95s cubic-bezier(0.45, 1.4, 0.55, 0.95);
  filter: drop-shadow(0 0 10px rgba(230,197,133,0.6));
}
.roll-toast .roll-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.roll-toast .roll-expr {
  font-family: "Cinzel", serif; color: var(--gold-bright);
  font-weight: 700; font-size: 1.15rem; letter-spacing: 0.05em;
  white-space: nowrap;
}
.roll-toast .roll-label {
  color: var(--text-dim); font-size: 0.78rem; font-style: italic;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.roll-toast.sent { border-color: var(--green); }
.roll-toast.sent .dice-icon { animation: diceLanded 0.4s ease-out; }
.roll-toast.error { border-color: var(--crimson-bright); }
.roll-toast.fade-out { animation: rollToastOut 0.5s ease-in forwards; }

@keyframes rollToastIn {
  0%   { opacity: 0; transform: translateY(-25px) scale(0.7); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes rollToastOut {
  0%   { opacity: 1; }
  100% { opacity: 0; transform: translateY(-15px) scale(0.95); }
}
@keyframes diceRoll {
  0%   { transform: rotate(0deg)    scale(1)   translateY(0); }
  25%  { transform: rotate(270deg)  scale(1.3) translateY(-6px); }
  50%  { transform: rotate(540deg)  scale(1.4) translateY(0); }
  75%  { transform: rotate(810deg)  scale(1.2) translateY(-3px); }
  100% { transform: rotate(1080deg) scale(1)   translateY(0); }
}
@keyframes diceLanded {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.25); filter: drop-shadow(0 0 18px rgba(90,140,58,0.8)); }
  100% { transform: scale(1); }
}

/* ─── DM SIDEBAR ─── */
.dm-sidebar {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 380px; max-width: 100vw;
  background: linear-gradient(180deg, var(--bg-card), var(--bg-deep));
  border-left: 2px solid var(--gold);
  box-shadow: -10px 0 40px rgba(0,0,0,0.6);
  z-index: 200;
  display: none; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.25s ease;
}
.dm-sidebar.show { display: flex; transform: translateX(0); }

.dm-sidebar-header {
  padding: 1rem 1.2rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(0,0,0,0.3);
}
.dm-sidebar-header h2 {
  font-size: 1rem; color: var(--gold-bright);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.dm-toolbar {
  padding: 0.6rem 1rem;
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
}
.dm-toolbar .die-btn { padding: 5px 10px; min-width: 44px; font-size: 0.8rem; }
.dm-toolbar input {
  flex: 1; min-width: 80px;
  padding: 5px 8px; background: var(--bg-deep);
  color: var(--text); border: 1px solid var(--border-strong);
  border-radius: 5px; font-family: inherit; font-size: 0.8rem;
}
.dm-rolls {
  flex: 1; overflow-y: auto;
  padding: 0.6rem 1rem;
}
.dm-roll {
  background: rgba(0,0,0,0.25); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem;
  position: relative;
  animation: rollFadeIn 0.4s ease;
}
@keyframes rollFadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.dm-roll.dm-own { border-left: 3px solid var(--gold); }
.dm-roll-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 0.25rem;
}
.dm-roll-who {
  font-weight: 700; color: var(--gold-bright); font-size: 0.85rem;
}
.dm-roll-time { color: var(--text-faint); font-size: 0.7rem; }
.dm-roll-label { color: var(--text-dim); font-size: 0.78rem; margin-bottom: 0.2rem; font-style: italic; }
.dm-roll-detail {
  font-size: 0.78rem; color: var(--text-dim); font-variant-numeric: tabular-nums;
  margin-top: 0.2rem;
}
.dm-roll-detail .die-val {
  display: inline-block; padding: 1px 6px; margin: 0 2px;
  background: var(--bg-deep); border: 1px solid var(--border);
  border-radius: 3px; color: var(--text); font-weight: 600;
}
.dm-roll-detail .die-val.crit { background: var(--green); color: var(--text); border-color: var(--green); }
.dm-roll-detail .die-val.fumble { background: var(--crimson); color: var(--text); border-color: var(--crimson-bright); }
.dm-roll-detail .die-val.discarded {
  opacity: 0.35; text-decoration: line-through;
  background: transparent;
}
.dm-roll-total {
  font-size: 1.4rem; font-weight: 800; color: var(--gold-bright);
  font-variant-numeric: tabular-nums;
  margin-top: 0.3rem;
}
.dm-roll-total .formula { font-size: 0.75rem; color: var(--text-faint); font-weight: 400; margin-left: 0.5rem; }
.dm-empty {
  padding: 2rem 1rem; text-align: center; color: var(--text-faint);
  font-size: 0.9rem; font-style: italic;
}

/* ─── SITE FOOTER ─── */
.site-footer {
  margin: 3rem auto 1.5rem;
  padding: 0 1.5rem;
  max-width: 1200px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  border-top: 1px solid var(--border);
  padding-top: 1rem;
  color: var(--text-faint);
  font-size: 0.78rem;
  letter-spacing: 0.02em;
}
.site-footer-text a {
  color: var(--text-dim);
  text-decoration: none;
  border-bottom: 1px dotted var(--text-faint);
}
.site-footer-text a:hover { color: var(--gold); border-bottom-color: var(--gold); }
.kofi-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.4rem 0.85rem;
  background: #ff5e5b;
  color: #1a1410;
  border-radius: 999px;
  font-weight: 600;
  font-size: 0.8rem;
  text-decoration: none;
  transition: transform 0.15s ease, filter 0.15s ease;
  box-shadow: 0 2px 8px rgba(255,94,91,0.25);
}
.kofi-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
/* The `hidden` HTML attribute would normally hide the element, but our
   .kofi-btn rule above sets `display: inline-flex` which has higher
   specificity and therefore wins. Re-assert display:none for [hidden]. */
.kofi-btn[hidden] { display: none; }

/* ─── RESPONSIVE ─── */
@media (max-width: 720px) {
  .grid { grid-template-columns: 1fr; padding: 0 1rem; gap: 1rem; }
  .vitals { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .hp-block { grid-column: 1 / -1; }
  .stats { grid-template-columns: repeat(3, 1fr); }
  .topbar { padding: 0.6rem 1rem; }
  .topbar-title h1 { font-size: 1.2rem; }
  .topbar-center {
    position: static;
    transform: none;
    order: 3;
    flex-basis: 100%;
    display: flex;
    justify-content: center;
    margin-top: 0.4rem;
  }
  .skill-grid { grid-template-columns: 1fr; }
  .dice-panel { padding: 0.6rem 1rem; }
  .dm-sidebar { width: 100vw; }
  .site-footer { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-title">
    <h1 id="groupTitle">⚔ Party</h1>
    <span class="sub">Party Status Dashboard</span>
  </div>
  <div class="topbar-center">
    <!-- href is set by loadConfig() only when a kofi_username is configured. -->
    <a id="kofiLink" class="kofi-btn" target="_blank" rel="noopener" hidden>
      ☕ Support on Ko-fi
    </a>
  </div>
  <div class="topbar-actions">
    <span class="meta"><span id="liveDot" class="live-dot"></span><span id="lastUpdate">—</span></span>
    <button id="refreshBtn">↻ Refresh</button>
    <select id="identitySelect" class="identity-select">
      <option value="">— Choose identity —</option>
    </select>
  </div>
</header>

<div id="grid" class="grid">
  <div class="status"><span class="spinner"></span>Loading characters…</div>
</div>

<section id="partyOverview" class="party-overview"></section>

<!-- Player dice panel (sticky bottom) -->
<div id="dicePanel" class="dice-panel">
  <div class="dice-panel-inner">
    <div class="dice-panel-label">
      🎲 Roll dice
      <small>hidden — only the DM sees your result</small>
    </div>
    <div class="dice-set" id="diceSet"></div>
    <button id="deathSaveBtn" class="die-btn death-save" title="Death Saving Throw — 1d20, 10+ is a success">💀 Death Save</button>
    <div class="dice-custom">
      <input type="text" id="customExpr" placeholder='e.g. 2d6+3 or 1d20-1' maxlength="40">
      <button id="customRollBtn" class="primary">Roll</button>
    </div>
    <div class="dice-status" id="diceStatus">no rolls yet</div>
  </div>
</div>

<!-- DM-Sidebar -->
<aside id="dmSidebar" class="dm-sidebar">
  <div class="dm-sidebar-header">
    <h2>🎩 DM roll log</h2>
    <button id="dmClearBtn" title="Clear roll log">✕ Clear</button>
  </div>
  <div class="dm-toolbar">
    <span style="color:var(--text-faint);font-size:.7rem;letter-spacing:1px;text-transform:uppercase;align-self:center;margin-right:.3rem">DM-eigen:</span>
    <button class="die-btn" data-dm-roll="1d4">d4</button>
    <button class="die-btn" data-dm-roll="1d6">d6</button>
    <button class="die-btn" data-dm-roll="1d8">d8</button>
    <button class="die-btn" data-dm-roll="1d10">d10</button>
    <button class="die-btn" data-dm-roll="1d12">d12</button>
    <button class="die-btn" data-dm-roll="1d20">d20</button>
    <button class="die-btn" data-dm-roll="1d100">d100</button>
    <input type="text" id="dmCustomExpr" placeholder="z.B. 2d6+3" maxlength="40">
    <button id="dmCustomRollBtn" class="primary">⚂</button>
  </div>
  <div class="dm-rolls" id="dmRolls">
    <div class="dm-empty">No rolls yet.</div>
  </div>
</aside>

<footer class="site-footer">
  <span class="site-footer-text">
    D&amp;D Party Dashboard — open source on
    <a href="https://github.com/SmokinAleks/dnd-party-dashboard" target="_blank" rel="noopener" id="repoLink">GitHub</a>
  </span>
</footer>

<script>
"use strict";

// Config is fetched at boot from /api/config/json and populated into these
// module-level variables. They are intentionally `let`, not `const`, so the
// boot routine can assign them before anything else runs.
let CONFIG    = null;        // full config slice from the server
let GROUP     = "party";     // group slug, overwritten at boot
let GROUP_NAME = "Party";    // display name, overwritten at boot
let STORAGE_IDENTITY = "party:identity";  // localStorage key, overwritten at boot

const REFRESH_INTERVAL_MS = 60_000;
const STALE_AFTER_MS      = 180_000;
const ROLL_POLL_MS        = 2_000;
// (No localStorage cursor for rolls — the server is the single source of truth.
//  Opening the DM sidebar reloads the full log fresh.)

let characters = [];
let lastSuccessAt = 0;
let inFlight = false;

let identity = null;          // {id: <number|"dm">, name, type}
let dmLastSeenRollId = 0;
let dmPollTimer = null;
const expandedIds = new Set();   // cards the user has expanded (survives auto-refresh)

// ─── Helpers ───
function el(tag, opts, ...children) {
  const e = document.createElement(tag);
  if (opts) {
    if (opts.class) e.className = opts.class;
    if (opts.text != null) e.textContent = opts.text;
    if (opts.html != null) e.innerHTML = opts.html;
    if (opts.style) e.setAttribute("style", opts.style);
    if (opts.attrs) for (const [k, v] of Object.entries(opts.attrs)) e.setAttribute(k, v);
    if (opts.on) for (const [k, v] of Object.entries(opts.on)) e.addEventListener(k, v);
  }
  for (const ch of children) {
    if (ch == null || ch === false) continue;
    e.appendChild(typeof ch === "string" ? document.createTextNode(ch) : ch);
  }
  return e;
}

async function fetchJSON(url, opts) {
  const r = await fetch(url, { cache: "no-cache", ...(opts || {}) });
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    try { const j = await r.json(); if (j.error) msg += `: ${j.error}`; } catch {}
    throw new Error(msg);
  }
  return r.json();
}

function formatMod(n) { return (n >= 0 ? "+" : "") + n; }

function relTime(ts) {
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 5) return "gerade eben";
  if (s < 60) return `vor ${s}s`;
  if (s < 3600) return `vor ${Math.round(s/60)} min`;
  return `vor ${Math.round(s/3600)} h`;
}

// ─── Character loading ───
async function loadAll() {
  if (inFlight) return;
  inFlight = true;
  const grid = document.getElementById("grid");
  if (!characters.length) {
    grid.innerHTML = `<div class="status"><span class="spinner"></span>Loading ${GROUP_NAME}…</div>`;
  }
  try {
    const groups = await fetchJSON("api/groups/json");
    const g = groups.find(x => x.name === GROUP);
    const ids = (g && Array.isArray(g.members)) ? g.members : [];
    if (!ids.length) {
      throw new Error("No characters configured. Please set 'character_ids' in config.php.");
    }

    const results = await Promise.all(ids.map(async id => {
      try { return await fetchJSON(`api/characters/${id}/json`); }
      catch (e) { return { id, _error: String(e) }; }
    }));

    characters = results;
    lastSuccessAt = Date.now();
    rebuildIdentityOptions();
    render();
  } catch (e) {
    console.error("[dashboard] loadAll failed:", e);
    if (!characters.length) {
      grid.innerHTML =
        `<div class="status error">⚠ ${e.message}<br>` +
        `<small style="color:var(--text-faint)">Server backend (<code>api.php</code>) reachable? ` +
        `Does <code>config.php</code> exist and is it valid?</small></div>`;
    }
  } finally {
    inFlight = false;
    updateLiveIndicator();
  }
}

function isPrivate(c) { return /^\d+ is Private$/.test(c.characterName || ""); }

function classLine(c) {
  if (!c.classes || !c.classes.length) return `Level ${c.level}`;
  return c.classes
    .map(cl => `${cl.name}${cl.subclass ? " (" + cl.subclass + ")" : ""} ${cl.level}`)
    .join(" / ");
}

function render() {
  const grid = document.getElementById("grid");
  if (!characters.length) {
    grid.innerHTML = '<div class="status error">No characters loaded.</div>';
    return;
  }
  const myId = identity && identity.type === "char" ? identity.id : null;
  const sorted = [...characters].sort((a, b) => {
    if (myId != null) {
      if (a.id === myId) return -1;
      if (b.id === myId) return 1;
    }
    const aPriv = isPrivate(a) ? 1 : 0;
    const bPriv = isPrivate(b) ? 1 : 0;
    if (aPriv !== bPriv) return aPriv - bPriv;
    return (a.characterName || "").localeCompare(b.characterName || "");
  });
  grid.innerHTML = "";
  sorted.forEach(c => grid.appendChild(buildCard(c)));
  renderPartyOverview();
}

function renderPartyOverview() {
  const ov = document.getElementById("partyOverview");
  if (!ov) return;
  const visible = characters.filter(c => !c._error && !isPrivate(c));
  if (visible.length === 0) { ov.innerHTML = ""; return; }

  const fmt1 = n => Number.isInteger(n) ? String(n) : n.toFixed(1);
  const sum  = arr => arr.reduce((a,b) => a + b, 0);
  const stat = (key) => {
    const vals = visible.map(c => (c.stats?.[key]?.totalValue) || 0);
    return { total: sum(vals), avg: sum(vals)/vals.length, min: Math.min(...vals), max: Math.max(...vals) };
  };
  const statKeys = [
    ["strength","Strength","STR"],
    ["dexterity","Dexterity","DEX"],
    ["constitution","Constitution","CON"],
    ["intelligence","Intelligence","INT"],
    ["wisdom","Wisdom","WIS"],
    ["charisma","Charisma","CHA"],
  ];

  ov.innerHTML = "";
  ov.appendChild(el("h2", { text: `⚔ Party overview (${GROUP_NAME})` }));

  // Stats
  for (const [k, name, short] of statKeys) {
    const s = stat(k);
    ov.appendChild(el("div", { class: "ov-card ov-stat" },
      el("div", { class: "ov-title", text: name }),
      el("div", { class: "ov-sub",   text: short }),
      el("div", { class: "ov-line", html: `<span class="lbl">Total:</span> ${s.total} &nbsp; <span class="lbl">Avg:</span> ${fmt1(s.avg)}` }),
      el("div", { class: "ov-line", html: `<span class="lbl">Min:</span> ${s.min} &nbsp; <span class="lbl">Max:</span> ${s.max}` })
    ));
  }

  // Hitpoints
  const cur = visible.map(c => c.currentHp || 0);
  const max = visible.map(c => c.maxHp || 0);
  ov.appendChild(el("div", { class: "ov-card ov-hp" },
    el("div", { class: "ov-title", text: "Hitpoints" }),
    el("div", { class: "ov-sub",   text: "HP" }),
    el("div", { class: "ov-line", html: `<span class="lbl">Total:</span> ${sum(cur)} / ${sum(max)}` }),
    el("div", { class: "ov-line", html: `<span class="lbl">Average:</span> ${fmt1(sum(cur)/cur.length)} / ${fmt1(sum(max)/max.length)}` }),
    el("div", { class: "ov-line", html: `<span class="lbl">Min:</span> ${Math.min(...cur)} / ${Math.min(...max)}` }),
    el("div", { class: "ov-line", html: `<span class="lbl">Max:</span> ${Math.max(...cur)} / ${Math.max(...max)}` })
  ));

  // Armor Class
  const acs = visible.map(c => c.armorClass || 0);
  ov.appendChild(el("div", { class: "ov-card ov-ac" },
    el("div", { class: "ov-title", text: "Armor Class" }),
    el("div", { class: "ov-sub",   text: "AC" }),
    el("div", { class: "ov-line", html: `<span class="lbl">Total:</span> ${sum(acs)} &nbsp; <span class="lbl">Average:</span> ${fmt1(sum(acs)/acs.length)}` }),
    el("div", { class: "ov-line", html: `<span class="lbl">Min:</span> ${Math.min(...acs)} &nbsp; <span class="lbl">Max:</span> ${Math.max(...acs)}` })
  ));

  // Currency
  const cu = { pp: 0, gp: 0, ep: 0, sp: 0, cp: 0 };
  for (const c of visible) {
    cu.pp += c.platinumPieces || 0;
    cu.gp += c.goldPieces     || 0;
    cu.ep += c.electrumPieces || 0;
    cu.sp += c.silverPieces   || 0;
    cu.cp += c.copperPieces   || 0;
  }
  const totalGp = cu.pp * 10 + cu.gp + cu.ep * 0.5 + cu.sp * 0.1 + cu.cp * 0.01;
  const fmt = n => n.toLocaleString("de-DE");
  ov.appendChild(el("div", { class: "ov-card ov-currency" },
    el("div", { class: "ov-title", text: "Currency" }),
    el("div", { class: "ov-sub",   text: "Gemeinsam" }),
    el("div", { class: "coin", html: `<span>${fmt(cu.pp)}</span><span class="lbl">Platinum</span>` }),
    el("div", { class: "coin", html: `<span>${fmt(cu.gp)}</span><span class="lbl">Gold</span>` }),
    el("div", { class: "coin", html: `<span>${fmt(cu.ep)}</span><span class="lbl">Electrum</span>` }),
    el("div", { class: "coin", html: `<span>${fmt(cu.sp)}</span><span class="lbl">Silver</span>` }),
    el("div", { class: "coin", html: `<span>${fmt(cu.cp)}</span><span class="lbl">Copper</span>` }),
    el("div", { class: "coin total", html: `<span>${fmt(Math.round(totalGp * 100) / 100)}</span><span>Total GP</span>` })
  ));

  // (Tools + Languages werden weiter unten gemeinsam mit Magic Items gerendert)
  const tools = new Set();
  for (const c of visible) (c.proficientTools || []).forEach(t => tools.add(t));
  const langs = new Set();
  for (const c of visible) (c.languages || []).forEach(l => langs.add(l));

  // Helper: aggregate items across all characters (source: 'magicItems' or 'partyItems')
  const aggregateItems = (sourceKey) => {
    const items = {};
    for (const c of visible) {
      for (const it of c[sourceKey] || []) {
        const k = it.name;
        if (!items[k]) items[k] = { rarity: it.rarity, holders: {}, anyAttuned: false, anyEquipped: false, magic: it.magic };
        items[k].holders[c.characterName] = (items[k].holders[c.characterName] || 0) + (it.qty || 1);
        if (it.attuned)  items[k].anyAttuned  = true;
        if (it.equipped) items[k].anyEquipped = true;
      }
    }
    return Object.entries(items).sort((a, b) => {
      const order = { 'Artifact': 0, 'Legendary': 1, 'Very Rare': 2, 'Rare': 3, 'Uncommon': 4, 'Common': 5 };
      const oa = order[a[1].rarity] ?? 9, ob = order[b[1].rarity] ?? 9;
      if (oa !== ob) return oa - ob;
      return a[0].localeCompare(b[0]);
    });
  };
  const buildItemList = (entries) => {
    const scroll = el("div", { class: "items-scroll" });
    entries.forEach(([name, info]) => {
      const holders = Object.entries(info.holders)
        .map(([h, q]) => q > 1 ? `${h.split(" ")[0]}×${q}` : h.split(" ")[0])
        .join(", ");
      const rarityClass = (info.rarity || "").toLowerCase().replace(/\s/g, "-");
      scroll.appendChild(el("div", { class: "party-item" },
        el("span", { class: "item-name", html:
          `${name}${info.anyAttuned ? '<span class="attune" title="attuned bei jemandem">⚡</span>' : ""}`
        }),
        el("span", { class: "item-rarity " + rarityClass, text: info.rarity || "Common" }),
        el("span", { class: "item-holders", text: holders })
      ));
    });
    return scroll;
  };

  // Party Inventory (volle Breite)
  const partyEntries = aggregateItems("partyItems");
  if (partyEntries.length) {
    ov.appendChild(el("div", { class: "ov-card party-inventory ov-party" },
      el("div", { class: "ov-title", text: "Party Inventory" }),
      el("div", { class: "ov-sub",   text: `${partyEntries.length} geteilte Items (Container „Party")` }),
      buildItemList(partyEntries)
    ));
  }

  // Letzte Reihe: Magic Items | Tools | Languages
  const magicEntries = aggregateItems("magicItems");
  if (magicEntries.length) {
    ov.appendChild(el("div", { class: "ov-card party-inventory ov-magic" },
      el("div", { class: "ov-title", text: "Magic Items" }),
      el("div", { class: "ov-sub",   text: `${magicEntries.length} personal magic items · ⚡ = attuned` }),
      buildItemList(magicEntries)
    ));
  }
  if (tools.size) {
    const list = el("div", { class: "ov-list" });
    [...tools].sort().forEach(t => list.appendChild(el("span", { class: "item", text: t })));
    ov.appendChild(el("div", { class: "ov-card ov-tools" },
      el("div", { class: "ov-title", text: "Proficiencies" }),
      el("div", { class: "ov-sub",   text: "Tools, Kits, Supplies, Instruments" }),
      list
    ));
  }
  if (langs.size) {
    const list = el("div", { class: "ov-list" });
    [...langs].sort().forEach(l => list.appendChild(el("span", { class: "item", text: l })));
    ov.appendChild(el("div", { class: "ov-card ov-langs" },
      el("div", { class: "ov-title", text: "Languages" }),
      el("div", { class: "ov-sub",   text: "Gemeinsam bekannt" }),
      list
    ));
  }
}

function buildCard(c) {
  if (c._error) {
    return el("div", { class: "card error" },
      el("div", null, `Character ${c.id} could not be loaded.`),
      el("small", null, c._error)
    );
  }
  if (isPrivate(c)) {
    return el("div", { class: "card private" },
      el("div", { class: "private-icon", text: "🔒" }),
      el("h3", { text: "Private character" }),
      el("p", { html:
        `D&D Beyond ID <code>${c.id}</code> is set to <em>private</em>.<br>` +
        `Player, please switch it to <strong>Public</strong> under <strong>D&D Beyond → Character → Privacy</strong>.`
      })
    );
  }

  const isMe = identity && identity.type === "char" && identity.id === c.id;
  const hp = c.currentHp;
  const hpPct = c.maxHp > 0 ? (hp / c.maxHp) * 100 : 0;
  const hpColor = hpPct > 66 ? "var(--green)" : hpPct > 33 ? "var(--gold)" : "var(--crimson)";

  // Header
  const avatarEl = c.avatarUrl
    ? el("img", {
        class: "avatar",
        attrs: { src: c.avatarUrl, alt: c.characterName, loading: "lazy" },
        on: { error: (ev) => {
          const fb = el("div", { class: "avatar-fallback", text: (c.characterName || "?")[0] });
          ev.target.replaceWith(fb);
        }}
      })
    : el("div", { class: "avatar-fallback", text: (c.characterName || "?")[0] });

  const header = el("div", { class: "card-header" },
    avatarEl,
    el("div", { class: "identity" },
      el("h2", null,
        el("a", {
          attrs: {
            href: `https://www.dndbeyond.com/characters/${c.id}`,
            target: "_blank",
            rel: "noopener noreferrer",
            title: "Open on D&D Beyond"
          },
          text: c.characterName
        })
      ),
      el("div", { class: "meta-line" },
        el("span", { text: c.raceName || "—" }),
        el("span", { text: "·" }),
        el("span", { class: "cls", text: classLine(c) }),
        el("span", { class: "level-pill", text: "Lvl " + c.level })
      )
    ),
    el("div", {
      class: "inspired-badge" + (c.inspired ? " on" : ""),
      attrs: { title: c.inspired ? "Inspiration active" : "No inspiration" },
      text: "★"
    })
  );

  // Vitals
  const dexMod = (c.stats && c.stats.dexterity && c.stats.dexterity.diceModifier) || 0;
  const profMod = c.proficiencyModifier || 0;

  const hpBar = el("div", { class: "hp-bar" });
  const hpFill = el("div", { class: "hp-bar-fill" });
  hpFill.style.width = hpPct + "%";
  hpFill.style.background = hpColor;
  hpBar.appendChild(hpFill);

  const hpBlock = el("div", { class: "hp-block" },
    el("div", { class: "hp-row1" },
      el("span", { class: "hp-label", text: "Hit Points" }),
      el("span", { class: "hp-value", html: `${hp}<span class="max"> / ${c.maxHp}</span>` })
    ),
    hpBar
  );

  const initVital = el("div", { class: "vital" + (isMe ? " rollable" : "") },
    el("div", { class: "vital-label", text: "Init" }),
    el("div", { class: "vital-value", text: formatMod(dexMod) }),
    el("div", { class: "vital-sub", text: "DEX" })
  );
  if (isMe) {
    initVital.style.cursor = "pointer";
    initVital.title = "Roll initiative (1d20" + formatMod(dexMod) + ") · Right-click: advantage/disadvantage";
    const initRoll = `1d20${formatMod(dexMod)}`;
    const initLabel = `${c.characterName}: Initiative`;
    initVital.addEventListener("click", () => sendRoll(initRoll, initLabel));
    attachAdvDisHandler(initVital, initRoll, initLabel);
  }

  const vitals = el("div", { class: "vitals" },
    hpBlock,
    el("div", { class: "vital" },
      el("div", { class: "vital-label", text: "AC" }),
      el("div", { class: "vital-value", text: String(c.armorClass) }),
      el("div", { class: "vital-sub", text: "🛡" })
    ),
    initVital,
    el("div", { class: "vital" },
      el("div", { class: "vital-label", text: "Prof" }),
      el("div", { class: "vital-value", text: "+" + profMod }),
      el("div", { class: "vital-sub", text: "Bonus" })
    ),
    el("div", { class: "vital" },
      el("div", { class: "vital-label", text: "Speed" }),
      el("div", { class: "vital-value", text: String(c.walkSpeed || 30) }),
      el("div", { class: "vital-sub", text: "ft" })
    )
  );

  // Stats
  const statsRow = el("div", { class: "stats" });
  const statKeys = ["strength", "dexterity", "constitution", "intelligence", "wisdom", "charisma"];
  for (const key of statKeys) {
    const s = c.stats && c.stats[key];
    if (!s) continue;
    const statEl = el("div", { class: "stat" + (isMe ? " rollable" : "") },
      el("div", { class: "stat-name", text: s.shortName }),
      el("div", { class: "stat-mod", text: formatMod(s.diceModifier) }),
      el("div", { class: "stat-val", text: String(s.totalValue) })
    );
    if (isMe) {
      const rollExpr  = `1d20${formatMod(s.diceModifier)}`;
      const rollLabel = `${c.characterName}: ${s.name}`;
      statEl.title = `Roll ${s.name} (${rollExpr}) · Right-click: advantage/disadvantage`;
      statEl.addEventListener("click", () => sendRoll(rollExpr, rollLabel));
      attachAdvDisHandler(statEl, rollExpr, rollLabel);
    }
    statsRow.appendChild(statEl);
  }

  // Skills
  const skillEntries = Object.values(c.skills || {}).sort((a, b) => a.name.localeCompare(b.name));
  const skillGrid = el("div", { class: "skill-grid" });
  for (const s of skillEntries) {
    const lvl = s.proficiencyLevel;
    const cls = lvl === "EXPERT" || lvl === "EXPERTISE" ? "prof expert"
              : lvl === "PROFICIENT" ? "prof" : "";
    const skillEl = el("div", { class: "skill " + cls + (isMe ? " rollable" : "") },
      el("span", { class: "name", text: s.name }),
      el("span", { class: "mod", text: formatMod(s.diceModifier) })
    );
    if (isMe) {
      const rollExpr  = `1d20${formatMod(s.diceModifier)}`;
      const rollLabel = `${c.characterName}: ${s.name}`;
      skillEl.title = `Roll ${s.name} (${rollExpr}) · Right-click: advantage/disadvantage`;
      skillEl.addEventListener("click", () => sendRoll(rollExpr, rollLabel));
      attachAdvDisHandler(skillEl, rollExpr, rollLabel);
    }
    skillGrid.appendChild(skillEl);
  }

  // Limited actions (read-only)
  const limList = el("div", { class: "actions-list" });
  for (const a of (c.limitedActions || [])) {
    const max = a.maxAmount || 1;
    const used = a.usedAmount || 0;
    const charges = el("div", { class: "lim-charges" });
    for (let i = 0; i < max; i++) {
      charges.appendChild(el("span", {
        class: "lim-charge" + (i < used ? " used" : ""),
        attrs: { title: i < used ? "used" : "available" }
      }));
    }
    limList.appendChild(el("div", { class: "lim-action" },
      el("div", null,
        el("div", { class: "name", text: a.name }),
        el("div", { class: "reset", text:
          `Reset: ${a.resetType || "—"}${a.actionType ? " · " + a.actionType : ""}`
        })
      ),
      charges
    ));
  }

  // Coins
  const coins = el("div", { class: "coins" });
  for (const [key, suf] of [
    ["platinumPieces", "pp"], ["goldPieces", "gp"], ["electrumPieces", "ep"],
    ["silverPieces", "sp"], ["copperPieces", "cp"]
  ]) {
    const v = c[key] || 0;
    if (v <= 0) continue;
    coins.appendChild(el("span", { class: "coin " + suf },
      el("span", { class: "v", text: v.toLocaleString("de-DE") }),
      document.createTextNode(" " + suf.toUpperCase())
    ));
  }

  // Expandable
  const expandContent = el("div", { class: "expand-content" });
  expandContent.appendChild(el("div", { class: "section-title", text:
    isMe ? "Skills (click to roll)" : "Skills"
  }));
  expandContent.appendChild(skillGrid);
  if (limList.children.length) {
    const t = el("div", { class: "section-title", style: "margin-top:1rem" });
    t.textContent = "Limited-use actions";
    expandContent.appendChild(t);
    expandContent.appendChild(limList);
  }
  if (coins.children.length) {
    const t = el("div", { class: "section-title", style: "margin-top:1rem" });
    t.textContent = "Coins";
    expandContent.appendChild(t);
    expandContent.appendChild(coins);
  }

  const expandBtn = el("button", { class: "expand-toggle", text: "▾ Skills, actions, coins" });
  // Zustand vom letzten Render wiederherstellen
  if (expandedIds.has(c.id)) {
    expandContent.classList.add("open");
    expandBtn.textContent = "▴ Collapse";
  }
  expandBtn.addEventListener("click", () => {
    const open = expandContent.classList.toggle("open");
    expandBtn.textContent = open ? "▴ Collapse" : "▾ Skills, actions, coins";
    if (open) expandedIds.add(c.id);
    else expandedIds.delete(c.id);
  });

  // ─── Conditions-Bar (nur wenn welche aktiv) ───
  let conditionsBar = null;
  if (c.conditions && c.conditions.length) {
    conditionsBar = el("div", { class: "conditions-bar" },
      el("span", { class: "cond-label", text: "⚠ Aktive Conditions:" })
    );
    for (const cond of c.conditions) {
      const label = cond.name + (cond.level > 1 ? " " + cond.level : "");
      const cls = "cond" + (cond.name === "Exhaustion" ? " exhaustion" : "");
      conditionsBar.appendChild(el("span", { class: cls, text: label }));
    }
  }

  const card = el("div", { class: "card" + (isMe ? " is-me" : ""), attrs: { "data-id": String(c.id) } },
    isMe ? el("div", { class: "me-badge", text: "Ich" }) : null,
    header, vitals, statsRow, conditionsBar, expandBtn, expandContent
  );
  return card;
}

// ─── Identity ───
function rebuildIdentityOptions() {
  const sel = document.getElementById("identitySelect");
  const cur = identity ? (identity.type === "dm" ? "dm" : String(identity.id)) : "";
  sel.innerHTML = '<option value="">— Choose identity —</option>';
  for (const c of characters) {
    if (c._error) continue;
    const opt = document.createElement("option");
    if (isPrivate(c)) {
      opt.value = String(c.id);
      opt.textContent = `🔒 Private character (${c.id})`;
    } else {
      opt.value = String(c.id);
      opt.textContent = c.characterName;
    }
    sel.appendChild(opt);
  }
  const dmOpt = document.createElement("option");
  dmOpt.value = "dm";
  dmOpt.textContent = "🎩 DM (Spielleiter)";
  sel.appendChild(dmOpt);
  sel.value = cur;
}

async function applyIdentity(value) {
  if (!value) {
    identity = null;
    localStorage.removeItem(STORAGE_IDENTITY);
  } else if (value === "dm") {
    // Verify DM auth — without the cookie, no DM mode.
    let isDm = false;
    try {
      const r = await fetch("api/dm/check", { credentials: "same-origin", cache: "no-cache" });
      const j = await r.json();
      isDm = !!j.is_dm;
    } catch {}
    if (!isDm) {
      alert("🔒 DM login required.\n\nNo DM cookie set in this browser yet. Please use the claim link a player generated for you.");
      document.getElementById("identitySelect").value = identity
        ? (identity.type === "dm" ? "dm" : String(identity.id))
        : "";
      return;
    }
    identity = { id: "dm", type: "dm", name: "DM" };
    localStorage.setItem(STORAGE_IDENTITY, value);
  } else {
    const id = parseInt(value, 10);
    const c = characters.find(x => x.id === id);
    const name = c && !isPrivate(c) ? c.characterName : `ID ${id}`;
    identity = { id, type: "char", name };
    localStorage.setItem(STORAGE_IDENTITY, value);
  }
  updateUiForIdentity();
  render();
}

function updateUiForIdentity() {
  const dicePanel = document.getElementById("dicePanel");
  const dmSidebar = document.getElementById("dmSidebar");
  if (!identity) {
    dicePanel.classList.remove("show");
    dmSidebar.classList.remove("show");
    stopDmPoll();
    document.body.style.paddingBottom = "4rem";
    document.body.style.paddingRight = "0";
    return;
  }
  if (identity.type === "dm") {
    dicePanel.classList.remove("show");
    dmSidebar.classList.add("show");
    startDmPoll();
    document.body.style.paddingBottom = "4rem";
    document.body.style.paddingRight = window.innerWidth > 720 ? "380px" : "0";
  } else {
    dicePanel.classList.add("show");
    dmSidebar.classList.remove("show");
    stopDmPoll();
    document.body.style.paddingBottom = "8rem";
    document.body.style.paddingRight = "0";
  }
}

// ─── Adv/Dis context menu (right-click) ───
function attachAdvDisHandler(elem, baseRoll, baseLabel) {
  elem.addEventListener("contextmenu", (e) => {
    // Only meaningful if the roll expression contains d20
    if (!/(^|\+)1d20([+-]\d+)?$/.test(baseRoll)) return;
    e.preventDefault();
    showAdvDisMenu(e.clientX, e.clientY, baseRoll, baseLabel);
  });
}
function showAdvDisMenu(x, y, baseRoll, baseLabel) {
  document.getElementById("rollContextMenu")?.remove();
  const advRoll = baseRoll.replace(/(^|\+)1d20/, "$12d20kh1");
  const disRoll = baseRoll.replace(/(^|\+)1d20/, "$12d20kl1");
  const menu = el("div", { class: "roll-context-menu", attrs: { id: "rollContextMenu" } },
    el("div", { class: "menu-hint", text: "Choice for this roll" }),
    el("button", { class: "menu-item adv", text: "🟢 With advantage",
      on: { click: () => { menu.remove(); sendRoll(advRoll, "ADV — " + baseLabel); } } }),
    el("button", { class: "menu-item dis", text: "🔴 With disadvantage",
      on: { click: () => { menu.remove(); sendRoll(disRoll, "DIS — " + baseLabel); } } }),
    el("button", { class: "menu-item", text: "⚪ Normal",
      on: { click: () => { menu.remove(); sendRoll(baseRoll, baseLabel); } } })
  );
  // Position innerhalb des Viewports halten
  const vw = window.innerWidth, vh = window.innerHeight;
  menu.style.left = Math.min(x, vw - 200) + "px";
  menu.style.top  = Math.min(y, vh - 160) + "px";
  document.body.appendChild(menu);
  setTimeout(() => {
    document.addEventListener("click", function close(ev) {
      if (!menu.contains(ev.target)) {
        menu.remove();
        document.removeEventListener("click", close);
      }
    });
  }, 50);
}

// ─── Rolling ───
function showRollToast(expression, label) {
  let container = document.getElementById("rollToastContainer");
  if (!container) {
    container = document.createElement("div");
    container.id = "rollToastContainer";
    document.body.appendChild(container);
  }
  const toast = document.createElement("div");
  toast.className = "roll-toast";
  const info = document.createElement("div");
  info.className = "roll-info";
  const exprEl = document.createElement("div");
  exprEl.className = "roll-expr";
  exprEl.textContent = "🎲 " + expression;
  info.appendChild(exprEl);
  if (label) {
    const lbl = document.createElement("div");
    lbl.className = "roll-label";
    lbl.textContent = label;
    info.appendChild(lbl);
  }
  const icon = document.createElement("span");
  icon.className = "dice-icon";
  icon.textContent = "🎲";
  toast.appendChild(icon);
  toast.appendChild(info);
  container.appendChild(toast);
  return toast;
}
function dismissToast(toast, klass) {
  if (!toast) return;
  if (klass) toast.classList.add(klass);
  setTimeout(() => toast.classList.add("fade-out"), 1300);
  setTimeout(() => toast.remove(), 1900);
}

async function sendRoll(expression, label) {
  if (!identity) { alert("Please pick an identity in the top right first."); return; }
  const toast = showRollToast(expression, label);
  const status = document.getElementById("diceStatus");
  if (status && identity.type !== "dm") {
    status.textContent = "Sende…";
    status.classList.remove("flash");
  }
  try {
    const r = await fetchJSON("api/roll", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        who: identity.name + (identity.type === "char" ? "" : " 🎩"),
        expression,
        label: label || "",
      }),
    });
    dismissToast(toast, "sent");
    if (status && identity.type !== "dm") {
      status.textContent = `✓ ${expression} → an DM gesendet (#${r.id})`;
      status.classList.add("flash");
    }
    // Beim DM: sofort polling triggern, damit eigener Wurf direkt erscheint
    if (identity.type === "dm") pollDmRolls();
  } catch (e) {
    dismissToast(toast, "error");
    if (status && identity.type !== "dm") {
      status.textContent = `✗ Error: ${e.message}`;
      status.classList.remove("flash");
    } else {
      alert("Wurf fehlgeschlagen: " + e.message);
    }
  }
}

// ─── DM-Polling ───
function startDmPoll() {
  if (dmPollTimer) return;
  // Frischstart: Sidebar leeren, kompletten Server-Stand holen.
  dmLastSeenRollId = 0;
  const list = document.getElementById("dmRolls");
  if (list) list.innerHTML = '<div class="dm-empty">Loading roll log…</div>';
  pollDmRolls();
  dmPollTimer = setInterval(pollDmRolls, ROLL_POLL_MS);
}

function stopDmPoll() {
  if (dmPollTimer) { clearInterval(dmPollTimer); dmPollTimer = null; }
}

async function pollDmRolls() {
  try {
    const r = await fetchJSON(`api/rolls?since=${dmLastSeenRollId}`);
    if (r.auth_required) {
      // Server says: DM cookie no longer valid — reset identity.
      stopDmPoll();
      identity = null;
      localStorage.removeItem(STORAGE_IDENTITY);
      document.getElementById("identitySelect").value = "";
      updateUiForIdentity();
      alert("DM session expired. Please log in again.");
      return;
    }
    if (r.rolls && r.rolls.length) {
      for (const roll of r.rolls) {
        appendDmRoll(roll);
        if (roll.id > dmLastSeenRollId) dmLastSeenRollId = roll.id;
      }
    } else if (dmLastSeenRollId === 0) {
      const list = document.getElementById("dmRolls");
      const empty = list && list.querySelector(".dm-empty");
      if (empty) empty.textContent = "No rolls yet.";
    }
  } catch (e) {
    console.warn("[dashboard] poll failed:", e);
  }
}

function appendDmRoll(roll) {
  const list = document.getElementById("dmRolls");
  const empty = list.querySelector(".dm-empty");
  if (empty) empty.remove();

  const detailFrag = el("div", { class: "dm-roll-detail" });
  for (const g of roll.dice) {
    detailFrag.appendChild(document.createTextNode((g.sign < 0 ? " − " : " ") + g.notation + ": "));
    const sidesMatch = g.notation.match(/d(\d+)/);
    const sides = sidesMatch ? parseInt(sidesMatch[1], 10) : 0;
    const keptSet = new Set(Array.isArray(g.kept) ? g.kept : g.values.map((_, i) => i));
    g.values.forEach((v, i) => {
      const isKept = keptSet.has(i);
      let cls = "die-val";
      if (!isKept) cls += " discarded";
      else if (sides === 20 && v === 20) cls += " crit";
      else if (sides === 20 && v === 1)  cls += " fumble";
      detailFrag.appendChild(el("span", { class: cls, text: String(v) }));
    });
  }
  if (roll.modifier !== 0) {
    detailFrag.appendChild(document.createTextNode(`  ${formatMod(roll.modifier)}`));
  }

  const isDmOwn = roll.who && roll.who.includes("🎩");
  const card = el("div", { class: "dm-roll" + (isDmOwn ? " dm-own" : "") },
    el("div", { class: "dm-roll-head" },
      el("span", { class: "dm-roll-who", text: roll.who }),
      el("span", { class: "dm-roll-time", text: relTime(roll.ts), attrs: { "data-ts": String(roll.ts) } })
    ),
    roll.label ? el("div", { class: "dm-roll-label", text: roll.label }) : null,
    detailFrag,
    el("div", { class: "dm-roll-total", html: `${roll.total}<span class="formula">  (${roll.expression})</span>` })
  );
  // Neueste oben einsortieren
  list.insertBefore(card, list.firstChild);
  // Cap bei ~100 Karten
  while (list.children.length > 100) list.removeChild(list.lastChild);
}

// Tick: Relative-Zeit-Labels in DM-Sidebar aktualisieren
setInterval(() => {
  document.querySelectorAll(".dm-roll-time[data-ts]").forEach(el => {
    el.textContent = relTime(parseInt(el.dataset.ts, 10));
  });
}, 5000);

// ─── Live indicator (character data freshness) ───
function updateLiveIndicator() {
  const el = document.getElementById("lastUpdate");
  const dot = document.getElementById("liveDot");
  if (!lastSuccessAt) { el.textContent = "—"; dot.classList.add("stale"); return; }
  const ageS = Math.round((Date.now() - lastSuccessAt) / 1000);
  el.textContent = ageS < 60 ? `vor ${ageS}s aktualisiert` : `vor ${Math.round(ageS/60)} min aktualisiert`;
  dot.classList.toggle("stale", ageS * 1000 > STALE_AFTER_MS);
}

// ─── Build dice buttons in the player panel ───
(function buildDiceSet() {
  const wrap = document.getElementById("diceSet");
  for (const sides of [4, 6, 8, 10, 12, 20, 100]) {
    const expr = "1d" + sides;
    const lbl  = `Wurf 1d${sides}`;
    const b = el("button", {
      class: "die-btn",
      text: "d" + sides,
      on: { click: () => sendRoll(expr, lbl) }
    });
    if (sides === 20) {
      b.title = "1d20 · Right-click: advantage/disadvantage";
      attachAdvDisHandler(b, expr, lbl);
    }
    wrap.appendChild(b);
  }
})();

// Death Saving Throw — 1d20, no mod (10+ is a success in D&D 5e)

);
attachAdvDisHandler(
  document.getElementById("deathSaveBtn"),

document.getElementById("dmCustomRollBtn").addEventListener("click", () => {

document.getElementById("dmClearBtn").addEventListener("click", async () => {
  if (!confirm("Clear the entire roll log?")) return;

    await fetchJSON("api/rolls/clear", { method: "POST" });

document.getElementById("customRollBtn").addEventListener("click", () => {

  const expr = input.value.trim();
  if (!expr) return;
  sendRoll(expr, "Custom: " + expr);

document.getElementById("customExpr").addEventListener("keydown", e => {

// ─── Refresh-Button & Auto-Refresh ───
document.getElementById("refreshBtn").addEventListener("click", loadAll);
setInterval(loadAll, REFRESH_INTERVAL_MS);
setInterval(updateLiveIndicator, 5000);
window.addEventListener("focus", () => {
  if (Date.now() - lastSuccessAt > 30_000) loadAll();
});
window.addEventListener("resize", updateUiForIdentity);

// ─── DM-Setup-Page (versteckte URL ?dm-setup) ─────────────────────
function renderDmSetupPage() {
  document.body.innerHTML = `
    <div class="setup-page">
      <h1>🎩 Generate DM login</h1>
      <p>One click creates a single-use login link. Send the URL to your DM
      (e.g. via Signal or WhatsApp). When they open it, <em>their</em> browser
      is permanently recognised as DM.</p>
      <p style="color:var(--text-faint);font-size:.85rem">
      Opening the link in <strong>your</strong> browser does not make you DM —
      the token is consumed on first use.</p>
      <button id="genBtn" class="primary">🔑 Generate new DM login</button>
      <div id="setupResult"></div>
    </div>`;
  document.getElementById("genBtn").addEventListener("click", async () => {
    try {
      const r = await fetch("api/dm/setup", { method: "POST", credentials: "same-origin" });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || "?");
      const result = document.getElementById("setupResult");
      result.innerHTML = `
        <p style="margin-top:1rem"><strong>Link ready — send it to your DM:</strong></p>
        <input id="urlField" type="text" readonly value="${j.url}">
        <button id="copyBtn" class="primary">📋 Copy</button>
        <p style="color:var(--text-faint);font-size:.8rem;margin-top:1rem">
        Valid for 7 days, then it expires. If the URL leaks, just generate a new one —
        the old one is invalidated the moment anyone clicks it.</p>`;
      document.getElementById("copyBtn").onclick = () => {
        const f = document.getElementById("urlField");
        f.select(); document.execCommand("copy");
        document.getElementById("copyBtn").textContent = "✓ Copied";
      };
    } catch (e) {
      alert("Error: " + e.message);
    }
  });
}

// ─── Boot ───

/**
 * Fetch /api/config/json once at startup and wire branding + slug into the UI.
 * If the server cannot deliver config (missing config.php, broken PHP, etc.),
 * show a clear error and abort — the dashboard cannot function without it.
 */
async function loadConfig() {
  try {
    CONFIG = await fetchJSON("api/config/json");
  } catch (e) {
    document.getElementById("grid").innerHTML =
      `<div class="status error">⚠ Could not load configuration.<br>` +
      `<small style="color:var(--text-faint)">${e.message}<br>` +
      `Is <code>config.php</code> sitting next to <code>api.php</code>? ` +
      `(Template: copy <code>config.example.php</code> and edit it.)</small></div>`;
    throw e;
  }
  GROUP            = CONFIG.group_slug || "party";
  GROUP_NAME       = CONFIG.group_name || "Party";
  STORAGE_IDENTITY = `${GROUP}:identity`;

  document.title = `${GROUP_NAME} — Party Dashboard`;
  const h1 = document.getElementById("groupTitle");
  if (h1) h1.textContent = `⚔ ${GROUP_NAME}`;

  // Ko-fi footer button: only shown when a username is configured.
  const kofiUser = (CONFIG.kofi_username || "").trim();
  const kofiLink = document.getElementById("kofiLink");
  if (kofiLink && kofiUser) {
    kofiLink.href   = "https://ko-fi.com/" + encodeURIComponent(kofiUser);
    kofiLink.hidden = false;
  }
}

(async function boot() {
  const url = new URL(window.location.href);

  // ?dm-claim=XXX → redeem token, set cookie, then go to dashboard
  if (url.searchParams.has("dm-claim")) {
    const token = url.searchParams.get("dm-claim");
    try {
      const r = await fetch("api/dm/claim?token=" + encodeURIComponent(token),
                            { method: "POST", credentials: "same-origin" });
      const j = await r.json();
      if (j.ok) {
        alert("✓ Successfully logged in as DM. Redirecting to the dashboard.");
      } else {
        alert("✗ Login failed: " + (j.error || "Invalid token"));
      }
    } catch (e) {
      alert("Error redeeming token: " + e.message);
    }
    window.location.replace("./");
    return;
  }

  // ?dm-setup → setup page (player generates a claim link)
  if (url.searchParams.has("dm-setup")) {
    renderDmSetupPage();
    return;
  }

  try { await loadConfig(); } catch { return; }
  await loadAll();
  const stored = localStorage.getItem(STORAGE_IDENTITY);
  if (stored) {
    document.getElementById("identitySelect").value = stored;
    applyIdentity(stored);
  }
})();
</script>
